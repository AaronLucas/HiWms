name: Secret Health Check

# 定期检查 HIWMS_SUPABASE_DEPLOY_KEY 是否仍然有效。
# Deploy Key 本身没有过期时间，但如果私钥被误删、公钥被从 HiWmsSupabase
# 移除，或仓库权限发生变更，本检查会第一时间失败并发出信号。
#
# 失败处理：
# 1. 在 HiWmsSupabase 仓库 Settings → Deploy keys 里确认公钥存在。
# 2. 如公钥丢失，重新生成一对 SSH key。
# 3. 在 HiWms 仓库 Settings → Secrets → Actions 里更新 HIWMS_SUPABASE_DEPLOY_KEY。

on:
  schedule:
    # 每月 1 日 09:00 UTC 运行一次
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  deploy-key:
    name: Verify HIWMS_SUPABASE_DEPLOY_KEY
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HiWmsSupabase with deploy key
        uses: actions/checkout@v4
        with:
          repository: AaronLucas/HiWmsSupabase
          ssh-key: ${{ secrets.HIWMS_SUPABASE_DEPLOY_KEY }}
          path: hiwms-supabase-src

      - name: Confirm repository reachable
        run: |
          if [[ ! -d hiwms-supabase-src/supabase/migrations ]]; then
            echo "❌ HiWmsSupabase migrations directory not found — deploy key may be invalid or repository path changed"
            exit 1
          fi
          echo "✅ Deploy key is valid and HiWmsSupabase is reachable"
